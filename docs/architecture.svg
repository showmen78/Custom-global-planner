<svg xmlns="http://www.w3.org/2000/svg" width="940" height="1150" viewBox="0 0 940 1150">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#555555"/>
    </marker>
    <style>
      .title { font-family: "Times New Roman", Georgia, serif; font-size: 30px; fill: #111111; }
      .label { font-family: "Times New Roman", Georgia, serif; font-size: 26px; fill: #111111; }
      .box { fill: #ece9f7; stroke: #a778ff; stroke-width: 2.2; }
      .dash { fill: none; stroke: #6f6f6f; stroke-width: 2.2; stroke-dasharray: 10 8; }
      .line { fill: none; stroke: #555555; stroke-width: 2.6; marker-end: url(#arrow); }
      .plain { fill: none; stroke: #555555; stroke-width: 2.6; }
    </style>
  </defs>

  <rect class="dash" x="225" y="55" width="510" height="820"/>
  <text class="title" x="480" y="100" text-anchor="middle">AD-map pipeline</text>

  <rect class="box" x="305" y="120" width="350" height="96"/>
  <text class="label" x="480" y="178" text-anchor="middle">Load xodr map</text>

  <line class="line" x1="480" y1="216" x2="480" y2="280"/>

  <rect class="box" x="305" y="280" width="350" height="96"/>
  <text class="label" x="480" y="335" text-anchor="middle">Match raw positions to</text>
  <text class="label" x="480" y="366" text-anchor="middle">drivable lanes</text>

  <line class="line" x1="480" y1="376" x2="480" y2="440"/>

  <rect class="box" x="305" y="440" width="350" height="96"/>
  <text class="label" x="480" y="498" text-anchor="middle">Find legal shortest route</text>

  <line class="line" x1="480" y1="536" x2="480" y2="600"/>

  <rect class="box" x="305" y="600" width="350" height="96"/>
  <text class="label" x="480" y="658" text-anchor="middle">Build lane-consistent path</text>

  <line class="line" x1="480" y1="696" x2="480" y2="760"/>

  <rect class="box" x="305" y="760" width="350" height="96"/>
  <text class="label" x="480" y="818" text-anchor="middle">Sample route centerline</text>

  <line class="line" x1="480" y1="856" x2="480" y2="920"/>

  <rect class="box" x="305" y="920" width="350" height="96"/>
  <text class="label" x="480" y="978" text-anchor="middle">Find adjacent lane points</text>

  <rect class="dash" x="20" y="890" width="890" height="190"/>
  <text class="title" x="465" y="940" text-anchor="middle">CARLA</text>

  <rect class="box" x="100" y="955" width="320" height="105"/>
  <text class="label" x="260" y="1021" text-anchor="middle">Find start &amp; goal position</text>

  <rect class="box" x="505" y="955" width="320" height="105"/>
  <text class="label" x="665" y="1021" text-anchor="middle">Visualize the route</text>

  <path class="line" d="M 260 955 L 260 170 L 303 170"/>
  <path class="plain" d="M 655 808 L 682 808 L 682 945"/>
  <line class="line" x1="682" y1="945" x2="665" y2="955"/>
</svg>
